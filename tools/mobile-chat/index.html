<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100dvh;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .header-title {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }

        .header-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            color: #667eea;
            line-height: 1;
        }

        .header-btn:active { background: rgba(102, 126, 234, 0.1); }

        .session-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding-top: 50px;
        }

        .session-panel.show { display: flex; }

        .session-list {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .session-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .session-item:active { background: #f5f5f5; }

        .session-item.current {
            background: #e8f0ff;
            border-left: 3px solid #667eea;
        }

        .session-title { font-size: 14px; font-weight: 600; color: #333; }
        .session-time { font-size: 11px; color: #999; margin-top: 2px; }

        .new-session-button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .new-session-button:active { background: #5568d3; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message { margin-bottom: 12px; display: flex; }
        .message.animate-in { animation: fadeIn 0.3s ease-in; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }

        .message-content {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 6px 0;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.05);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .input-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 12px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            box-shadow: 0 -1px 6px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 22px;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        #messageInput:focus { border-color: #667eea; }

        #sendButton {
            width: 42px; height: 42px;
            border: none;
            border-radius: 50%;
            background: #667eea;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #sendButton:active { transform: scale(0.92); }
        #sendButton:disabled { background: #ccc; cursor: not-allowed; }

        .typing-indicator {
            display: none;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
        }

        .typing-indicator.show { display: inline-block; }

        .typing-indicator span {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .message-content.tool-call {
            background: rgba(255, 255, 255, 0.8);
            border-left: 3px solid #667eea;
            font-size: 12px;
            padding: 8px 12px;
            max-width: 82%;
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            color: #555;
        }

        .tool-icon { font-size: 13px; }
        .tool-name { flex: 1; }

        .tool-state {
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            background: #e0e0e0;
            color: #666;
        }

        .tool-state.call { background: #fff3cd; color: #856404; }
        .tool-state.result { background: #d4edda; color: #155724; }

        .tool-summary {
            margin-top: 4px;
            color: #888;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="header-btn" onclick="toggleSessionPanel()" title="会话列表">☰</button>
        <div class="header-title">AI Chat</div>
        <button class="header-btn" onclick="createNewSession()" title="新建会话">＋</button>
    </div>

    <div class="session-panel" id="sessionPanel" onclick="closeSessionPanel(event)">
        <div class="session-list" id="sessionList"></div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-container">
        <textarea
            id="messageInput"
            placeholder="输入消息..."
            rows="1"
            onkeydown="handleKeyPress(event)"
            oninput="autoResize(this)"
        ></textarea>
        <button id="sendButton" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        let sessionId = null;
        let isSending = false;
        let lastMessageCount = 0;
        let lastPartCount = 0;

        // 已渲染的 part ID 集合，用于增量渲染
        const renderedPartIds = new Set();

        // ── 初始化 ──
        async function initSession() {
            try {
                const response = await fetch('/api/session');
                const data = await response.json();
                if (data.sessionId) {
                    sessionId = data.sessionId;
                    await loadHistory();
                }
            } catch (error) {
                console.error('Failed to initialize session:', error);
                addMessage('无法连接到 AI 服务，请确保 OpenCode 正在运行', false);
            }
        }

        // ── 增量加载会话历史 ──
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                if (!response.ok) return;
                const messages = await response.json();
                if (!Array.isArray(messages)) return;

                lastMessageCount = messages.length;
                lastPartCount = messages.reduce((sum, m) => sum + (m.parts?.length || 0), 0);

                messages.forEach(msg => {
                    const isUser = msg.info?.role === 'user';
                    if (!msg.parts) return;

                    msg.parts.forEach(part => {
                        // 跳过无 ID 或已渲染的 part
                        if (!part.id || renderedPartIds.has(part.id)) return;
                        renderedPartIds.add(part.id);

                        if (part.type === 'text' && part.text && part.text.trim()) {
                            addMessage(part.text, isUser, true);
                        }
                        else if (part.type === 'tool') {
                            addToolCall(part);
                        }
                        else if (part.type === 'patch') {
                            addPatchCard(part);
                        }
                        else if (part.type === 'file') {
                            addFileCard(part);
                        }
                    });
                });
            } catch (error) {
                console.error('Failed to load history:', error);
            }
        }

        // ── 全量重新加载（切换会话时） ──
        async function reloadHistory() {
            renderedPartIds.clear();
            chatContainer.innerHTML = '';
            await loadHistory();
        }

        // ── 渲染工具调用卡片 ──
        function addToolCall(part) {
            const toolName = part.tool || '工具';
            const status = part.state?.status || 'unknown';
            const icons = { bash: '⌨️', read: '📖', edit: '✏️', write: '📝', grep: '🔍', glob: '📂', task: '🤖', todowrite: '📋' };
            const icon = icons[toolName] || '🔧';

            let summary = '';
            const input = part.state?.input;
            if (input) {
                if (toolName === 'bash') summary = input.description || input.command?.substring(0, 60) || '';
                else if (toolName === 'task') summary = input.description || '';
                else if (input.filePath) summary = input.filePath.replace(/^E:\\重要文件\\card-html\\/, '');
                else if (input.path) summary = input.path;
                else if (input.pattern) summary = input.pattern;
                else if (input.command) summary = input.command.substring(0, 60);
                else if (input.description) summary = input.description;
            }

            const statusClass = status === 'completed' ? 'result' : status === 'running' ? 'call' : '';
            const statusText = { running: '运行中', completed: '完成', error: '错误' }[status] || status;

            appendToChat(`
                <div class="message-content tool-call">
                    <div class="tool-header">
                        <span class="tool-icon">${icon}</span>
                        <span class="tool-name">${toolName}</span>
                        <span class="tool-state ${statusClass}">${statusText}</span>
                    </div>
                    ${summary ? `<div class="tool-summary">${escapeHtml(summary)}</div>` : ''}
                </div>
            `, 'ai');
        }

        function addPatchCard(part) {
            const filePath = (part.file || '').replace(/^E:\\重要文件\\card-html\\/, '');
            appendToChat(`
                <div class="message-content tool-call">
                    <div class="tool-header">
                        <span class="tool-icon">✏️</span>
                        <span class="tool-name">编辑文件</span>
                        <span class="tool-state result">完成</span>
                    </div>
                    ${filePath ? `<div class="tool-summary">${escapeHtml(filePath)}</div>` : ''}
                </div>
            `, 'ai');
        }

        function addFileCard(part) {
            const filePath = (part.path || '').replace(/^E:\\重要文件\\card-html\\/, '');
            appendToChat(`
                <div class="message-content tool-call">
                    <div class="tool-header">
                        <span class="tool-icon">📖</span>
                        <span class="tool-name">读取文件</span>
                    </div>
                    ${filePath ? `<div class="tool-summary">${escapeHtml(filePath)}</div>` : ''}
                </div>
            `, 'ai');
        }

        // ── 统一追加消息到聊天容器 ──
        function appendToChat(html, role) {
            const div = document.createElement('div');
            div.className = `message ${role} animate-in`;
            div.innerHTML = html;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ── 添加文本消息 ──
        function addMessage(content, isUser, animate = true) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            if (animate) div.classList.add('animate-in');

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);

            div.appendChild(contentDiv);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatMessage(content) {
            content = content.trim();
            content = content.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
            content = content.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            content = content.replace(/\n{3,}/g, '\n\n');
            content = content.replace(/\n/g, '<br>');
            return content;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ── 打字指示器 ──
        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message ai animate-in';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-content typing-indicator show">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ── 发送消息 ──
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            if (!sessionId) {
                addMessage('会话尚未初始化，请稍后再试', false);
                return;
            }

            isSending = true;
            addMessage(message, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendButton.disabled = true;
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });

                hideTypingIndicator();

                if (response.ok) {
                    // 直接显示回复文本
                    const data = await response.json();
                    if (data.reply && data.reply.trim()) {
                        addMessage(data.reply, false);
                    }
                    // 增量加载历史（获取工具调用等中间步骤）
                    await loadHistory();
                } else {
                    addMessage('抱歉，发生了错误，请稍后再试。', false);
                }
            } catch (error) {
                hideTypingIndicator();
                addMessage('网络连接失败，请检查网络设置。', false);
            } finally {
                isSending = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        }

        // ── 页面加载 ──
        window.addEventListener('load', async () => {
            await initSession();
            messageInput.focus();
            startRealtimeUpdates();
        });

        // ── 实时更新 ──
        function startRealtimeUpdates() {
            setInterval(async () => {
                if (!sessionId || isSending) return;
                try {
                    const response = await fetch('/api/history');
                    if (!response.ok) return;
                    const messages = await response.json();
                    const currentMsgCount = messages.length;
                    const currentPartCount = messages.reduce((sum, m) => sum + (m.parts?.length || 0), 0);

                    if (currentMsgCount > lastMessageCount || currentPartCount > lastPartCount) {
                        if (lastMessageCount > 0) {
                            await loadHistory();
                        }
                    }
                    lastMessageCount = currentMsgCount;
                    lastPartCount = currentPartCount;
                } catch (error) { /* silent */ }
            }, 3000);
        }

        // ── 会话管理 ──
        function toggleSessionPanel() {
            const panel = document.getElementById('sessionPanel');
            if (panel.classList.contains('show')) {
                panel.classList.remove('show');
            } else {
                loadSessions();
                panel.classList.add('show');
            }
        }

        function closeSessionPanel(event) {
            if (event.target.id === 'sessionPanel') {
                document.getElementById('sessionPanel').classList.remove('show');
            }
        }

        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                const sessions = await response.json();
                const sessionList = document.getElementById('sessionList');
                sessionList.innerHTML = '';

                sessions.forEach(session => {
                    const item = document.createElement('div');
                    item.className = 'session-item' + (session.id === sessionId ? ' current' : '');
                    const title = session.title || '未命名会话';
                    const time = session.created_at
                        ? new Date(session.created_at).toLocaleString('zh-CN')
                        : '';
                    item.innerHTML = `
                        <div class="session-title">${escapeHtml(title)}</div>
                        ${time ? `<div class="session-time">${time}</div>` : ''}
                    `;
                    item.onclick = () => switchSession(session.id);
                    sessionList.appendChild(item);
                });

                const newBtn = document.createElement('button');
                newBtn.className = 'new-session-button';
                newBtn.textContent = '+ 新建会话';
                newBtn.onclick = createNewSession;
                sessionList.appendChild(newBtn);
            } catch (error) {
                console.error('Failed to load sessions:', error);
            }
        }

        async function switchSession(targetSessionId) {
            try {
                const response = await fetch(`/api/switch-session/${targetSessionId}`, { method: 'POST' });
                if (response.ok) {
                    sessionId = targetSessionId;
                    document.getElementById('sessionPanel').classList.remove('show');
                    lastMessageCount = 0;
                    lastPartCount = 0;
                    await reloadHistory();
                }
            } catch (error) {
                console.error('Failed to switch session:', error);
            }
        }

        async function createNewSession() {
            try {
                const response = await fetch('/api/new-session', { method: 'POST' });
                if (response.ok) {
                    const session = await response.json();
                    sessionId = session.id;
                    document.getElementById('sessionPanel').classList.remove('show');
                    lastMessageCount = 0;
                    lastPartCount = 0;
                    await reloadHistory();
                }
            } catch (error) {
                console.error('Failed to create session:', error);
            }
        }

        // ── 视口高度适配 ──
        function setViewportHeight() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
            document.body.style.height = `${vh * 100}px`;
        }
        setViewportHeight();
        window.addEventListener('resize', setViewportHeight);
        window.addEventListener('orientationchange', () => setTimeout(setViewportHeight, 100));
        messageInput.addEventListener('focus', () => setTimeout(setViewportHeight, 300));
    </script>
</body>
</html>
