<div class="tabs-panel admin-panel" id="panel_tokens">
  <div class="main">
    <main>
      <padding>
        <div class="tokens-toolbar panel-enter-target">
          <h2 data-i18n="tokens.title">词元</h2>
          <div class="toolbar-actions">
            <div class="ui-input-group admin-input-group">
              <input id="tokens-search" class="ui-field ui-input-field admin-input" type="text" data-i18n-attr="placeholder" data-i18n-placeholder="tokens.search.placeholder" placeholder="搜索..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="search" data-lpignore="true" />
              <button class="btn btn--secondary ui-input-action admin-input-btn admin-toolbar-action" id="tokens-refresh-btn" data-i18n="tokens.refresh">刷新</button>
            </div>
          </div>
        </div>
        <div id="tokens-summary" class="panel-enter-target"></div>
        <div id="tokens-content" class="panel-enter-target"></div>
      </padding>
    </main>
  </div>
</div>
