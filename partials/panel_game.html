<div class="tabs-panel" id="panel_game">
    <div class="game-container">
        <!-- Top Section: Board/Controls + Sidebar -->
        <div class="game-top-section">

            <!-- ====== VIEW: Setup Panel ====== -->
            <div id="game-view-setup" class="game-view hidden">
                <div id="game-setup-ui" class="game-panel setup-panel">
                    <div class="row">
                         <div class="input-group">
                            <span class="input-group-label" data-i18n="game.setup.playerCount">座位数</span>
                            <select id="setup-player-count-select" class="input-group-field">
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4" selected>4</option>
                                <option value="5">5</option>
                                <option value="8">8</option>
                            </select>
                         </div>
                         <!-- Allow Spectate Toggle (only visible for host in room) -->
                         <div class="input-group hidden" id="setup-allow-spectate-group">
                            <span class="input-group-label" data-i18n="online.allowSpectate">允许旁观</span>
                            <span id="setup-allow-spectate-toggle" class="setup-click-toggle is-active" data-value="true">是</span>
                         </div>
                    </div>
                    <div class="row">
                         <div class="input-group">
                            <span class="input-group-label" data-i18n="game.setup.cardPreset">Card Preset</span>
                            <select id="setup-card-preset-select" class="input-group-field">
                                <option value="standard" data-i18n="game.setup.preset.standard">Standard</option>
                                <option value="80sha80shan" data-i18n="game.setup.preset.80sha80shan">80 Sha 80 Shan</option>
                            </select>
                         </div>
                         
                         <!-- Mode Toggle (click to switch) -->
                         <div class="input-group">
                            <span class="input-group-label" data-i18n="game.setup.autoTiming">自动时机</span>
                            <span id="setup-mode-toggle" class="setup-click-toggle" data-value="sandbox" data-i18n="game.setup.autoTimingNo">否</span>
                         </div>
                    </div>
                    <div id="setup-players-list">
                        <!-- Dynamic Inputs -->
                    </div>
                    <div class="text-center setup-actions">
                        <button id="btn-confirm-setup" class="btn btn--success" data-i18n="game.setup.start">Start Game</button>
                    </div>
                </div>
            </div>

            <!-- ====== VIEW: Online Room Panel ====== -->
            <div id="game-view-online" class="game-view hidden">
                <div id="online-room-ui" class="game-panel">
                    <div class="online-panel-header">
                        <h4 data-i18n="online.title">在线房间</h4>
                        <span id="online-status" class="online-status"></span>
                    </div>

                    <!-- 大厅视图 -->
                    <div id="online-lobby">
                        <div class="online-create-row">
                            <div class="input-group">
                                <span class="input-group-label" data-i18n="online.roomId">房间ID</span>
                                <input type="text" id="input-room-id" class="input-group-field" placeholder="输入房间名" maxlength="20">
                            </div>
                            <button id="btn-create-room" class="btn btn--success btn--sm" data-i18n="online.create">创建房间</button>
                            <button id="btn-refresh-rooms" class="btn btn--secondary btn--sm" data-i18n="online.refresh">刷新</button>
                        </div>

                        <div class="online-room-list-header" data-i18n="online.roomList">房间列表</div>
                        <div id="room-list" class="online-room-list scrollbar-thin">
                            <div class="room-empty" data-i18n="online.noRooms">暂无房间</div>
                        </div>
                    </div>

                    <!-- 房间内视图 -->
                    <div id="online-in-room" class="hidden">
                        <div class="online-room-info">
                            <span data-i18n="online.currentRoom">当前房间：</span>
                            <strong id="current-room-name"></strong>
                            <span class="room-user-count-wrap">(<span id="room-user-count">0</span> <span data-i18n="online.players">人</span>)</span>
                        </div>
                        <div id="room-user-list" class="online-user-list"></div>
                        <div class="text-center online-actions">
                            <button id="btn-spectate" class="btn btn--secondary btn--sm hidden" data-i18n="online.spectate">旁观</button>
                            <button id="btn-back-lobby" class="btn btn--secondary btn--sm" data-i18n="online.backToLobby">返回大厅</button>
                            <button id="btn-leave-room" class="btn btn--danger btn--sm" data-i18n="online.leave">离开房间</button>
                        </div>
                        <div id="room-no-spectate-hint" class="online-hint online-hint--warn hidden">🚫 该房间禁止旁观</div>
                        <div class="online-hint" data-i18n="online.sandboxHint">在线模式下固定为 Sandbox 模式，请通过「游戏设置」选择武将和牌堆后开始游戏。</div>
                    </div>


                </div>
            </div>

            <!-- ====== VIEW: Game Play (Board + Table) ====== -->
            <div id="game-view-play" class="game-view hidden">
            <div class="game-layout-main">

            <!-- Card Table Area (Encircling Layout) -->
            <div class="game-panel game-table-panel hidden" id="game-table-panel" style="background: none; border: none; box-shadow: none; padding: 0;">
                <div class="table-layout-grid">
                    <!-- Left Side (Upstream) -->
                    <div class="table-side-col left-col">
                        <div id="role-list-left" class="role-column"></div>
                    </div>

                    <!-- Center (Top Opponents + Treatment Area) -->
                    <div class="table-center-col">
                        <!-- Top Row Opponents -->
                        <div id="role-list-top" class="role-row"></div>
                        
                        <!-- Treatment Area (Center) & Piles -->
                        <div class="game-panel game-board-panel hidden" id="game-board-panel" style="width: 100%;">
                            <div class="board-area-row" style="display: flex; gap: 15px; align-items: flex-start; justify-content: center; min-height: 140px;">
                                
                                <!-- Draw Pile (Left) -->
                                <div class="board-pile-slot" style="flex: 0 0 100px; width: 100px; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 5;">
                                    <div id="header-pile" class="area-watermark"></div>
                                    <div id="pile-container" class="cards-container pile-container deck-slot" data-area-name="pile" style="flex: 1; position: relative;">
                                        <!-- Cards here -->
                                    </div>
                                </div>

                                <!-- Treatment Area (Center) -->
                                <div class="treatment-area-wrappper" style="flex: 0.8; position: relative; min-width: 0; display: flex; flex-direction: column; z-index: 1;">
                                    <div id="header-treatment-area" class="area-watermark"></div>
                                    <div id="treatment-area-container" class="cards-container treatment-container" data-area-name="treatmentArea" style="flex: 1;">
                                        <!-- Cards will be rendered here -->
                                    </div>
                                </div>

                                <!-- Discard Pile (Right) -->
                                <div class="board-pile-slot" style="flex: 0 0 100px; width: 100px; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 5;">
                                    <div id="header-discard-pile" class="area-watermark"></div>
                                    <div id="discard-pile-container" class="cards-container pile-container deck-slot" data-area-name="discardPile" style="flex: 1; position: relative;">
                                        <!-- Cards here -->
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- Right Side (Downstream) -->
                    <div class="table-side-col right-col">
                        <div id="role-list-right" class="role-column"></div>
                    </div>
                </div>
            </div>

            </div> <!-- End of game-layout-main -->

            <div class="game-layout-sidebar">
                <div class="game-panel game-log-panel scrollbar-thin">
                    <div id="game-timing-badge" class="timing-badge"></div>
                    <div id="game-breadcrumbs" class="breadcrumbs"></div>
                    <div id="game-move-log" class="move-log scrollbar-thin"></div>
                </div>
            </div>

            </div> <!-- End of game-view-play -->

        </div> <!-- End of game-top-section -->
        
        <!-- Bottom Section: Main Perspective -->
        <div class="game-bottom-section">
            <!-- Independent Control Panel -->
            <div class="game-panel game-action-panel">
                <div id="game-controls">
                    <button class="btn btn--primary" id="btn-show-setup" data-i18n="game.setup">Game Setup</button>
                    <button class="btn btn--accent" id="btn-show-online" data-i18n="online.room">Online Room</button>
                    <button class="btn btn--primary hidden" id="btn-start-game" data-i18n="game.start">Start Game</button>
                    <button class="btn btn--secondary hidden" id="btn-pause-game">Pause</button>
                    

                    <button class="btn btn--success hidden" id="btn-play-card" data-i18n="game.playCard">Play Card</button>
                    <button class="btn btn--danger hidden" id="btn-end-turn" data-i18n="game.endTurn">End Turn</button>
                </div>
            </div>

            <div class="game-main-area hidden" id="game-main-area">
                <div class="main-perspective-container">
                <div class="current-character-panel" style="position: relative;">
                    <div class="player-hand" style="position: relative;">
                        <div id="header-hand-area" class="area-watermark">Hand Cards</div>
                        <div id="hand-cards-container" class="cards-container" data-area-name="hand">
                            <!-- Cards will be rendered here -->
                        </div>
                    </div>

                    <div class="character-info">
                        <div class="char-avatar">
                            <img id="char-img" src="" alt="Character Avatar">
                        </div>
                        <div class="char-details">
                            <div class="name-row">
                                <h3 id="char-name">Character Name</h3>
                            </div>
                            <div class="char-stats">
                                <span class="stat-hp" id="char-hp-display">4/4</span>
                                <div class="stats-btn-group">
                                    <button class="judge-detail-btn main-judge-btn">判</button>
                                    <button class="equip-detail-btn main-equip-btn">備</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Role List moved to Top Table Panel -->
            </div>
        </div>
        </div> <!-- End of game-bottom-section -->
    </div>
</div>
